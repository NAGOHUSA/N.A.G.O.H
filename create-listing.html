<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing • N.A.G.O.H</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050A;
      color: #EAEAFF;
      font-family: 'Courier New', monospace;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      background: #0F0F1A;
      border: 1px solid #252540;
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #8a78ff, #52dcb4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #8F8FAA;
      margin-top: 1rem;
      margin-bottom: 0.25rem;
    }
    input, select, textarea {
      width: 100%;
      background: #0A0A12;
      border: 1px solid #252540;
      border-radius: 0.5rem;
      padding: 0.75rem;
      color: white;
      font-family: monospace;
    }
    button {
      background: linear-gradient(135deg, #8a78ff, #52dcb4);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      margin-right: 0.5rem;
    }
    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      white-space: pre-wrap;
    }
    .status.success {
      background: #0a1a1a;
      border-left: 3px solid #52dcb4;
      color: #c0ffea;
    }
    .status.error {
      background: #1a0a0a;
      border-left: 3px solid #f06464;
      color: #ffb8c4;
    }
    .status.info {
      background: #0a0a1a;
      border-left: 3px solid #8a78ff;
      color: #cdc6ff;
    }
    .hidden { display: none; }
    .badge {
      display: inline-block;
      background: rgba(82,220,180,0.2);
      border-radius: 1rem;
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Create Listing 🚀</h1>
      
      <div id="status" class="status info">🔍 Checking worker connection...</div>
      
      <form id="listingForm">
        <label>Project name *</label>
        <input type="text" name="title" required placeholder="e.g. SwiftWallet">
        
        <label>Description *</label>
        <textarea name="description" required placeholder="Describe your project..."></textarea>
        
        <label>Platform *</label>
        <select name="platform" required>
          <option value="iOS">iOS</option>
          <option value="Android">Android</option>
          <option value="iOS + Android">iOS + Android</option>
        </select>
        
        <label>GitHub URL *</label>
        <input type="url" name="repoUrl" required placeholder="https://github.com/...">
        
        <label>Payment Link *</label>
        <input type="url" name="sellerPaymentLink" required placeholder="https://buy.stripe.com/...">
        
        <label>Price (USD) *</label>
        <input type="number" name="priceUsd" required min="1" placeholder="499">
        
        <label>Tech Stack</label>
        <input type="text" name="techStack" placeholder="SwiftUI, Firebase, ...">
        
        <label>Icon URL</label>
        <input type="url" name="iconUrl" placeholder="https://...">
        
        <label>Contact Email *</label>
        <input type="email" name="contactEmail" required placeholder="you@example.com">
        
        <label>Duration (days) *</label>
        <input type="number" name="expiresInDays" required min="1" max="90" value="30">
        
        <button type="button" id="demoBtn">⚡ Fill Demo Data</button>
        <button type="submit">✨ Create Listing</button>
      </form>
      
      <div id="result" class="status hidden"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://nagoh-relay-v2.gregoryhogan.workers.dev';
    
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const form = document.getElementById('listingForm');
    
    async function testConnection() {
      statusDiv.classList.remove('hidden');
      statusDiv.className = 'status info';
      statusDiv.textContent = '🔍 Testing worker connection...';
      
      try {
        const response = await fetch(`${WORKER_URL}/health`);
        if (response.ok) {
          const data = await response.json();
          statusDiv.className = 'status success';
          statusDiv.textContent = '✅ Worker connected! Ready to create listings.';
          return true;
        } else {
          throw new Error(`HTTP ${response.status}`);
        }
      } catch (error) {
        statusDiv.className = 'status error';
        statusDiv.textContent = `❌ Cannot reach worker: ${error.message}\n\nMake sure you're not blocking CORS and the worker is deployed.`;
        return false;
      }
    }
    
    // Demo data
    document.getElementById('demoBtn').addEventListener('click', () => {
      form.querySelector('[name="title"]').value = 'SwiftWallet - AI Finance Tracker';
      form.querySelector('[name="description"]').value = 'Fully functional iOS app with SwiftUI, CoreData, and real-time expense tracking. Missing push notifications.';
      form.querySelector('[name="repoUrl"]').value = 'https://github.com/demo/swiftwallet';
      form.querySelector('[name="sellerPaymentLink"]').value = 'https://buy.stripe.com/test_123';
      form.querySelector('[name="priceUsd"]').value = '349';
      form.querySelector('[name="techStack"]').value = 'SwiftUI, Combine, Firebase';
      form.querySelector('[name="iconUrl"]').value = 'https://placehold.co/256x256/8a78ff/white?text=SW';
      form.querySelector('[name="contactEmail"]').value = 'founder@swiftwallet.io';
      form.querySelector('[name="expiresInDays"]').value = '45';
      
      resultDiv.className = 'status success';
      resultDiv.textContent = '✅ Demo data filled! Review and submit.';
      resultDiv.classList.remove('hidden');
      
      setTimeout(() => {
        resultDiv.classList.add('hidden');
      }, 3000);
    });
    
    // Submit form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      resultDiv.classList.remove('hidden');
      resultDiv.className = 'status info';
      resultDiv.textContent = '⏳ Submitting...';
      
      const formData = new FormData(form);
      const payload = {
        title: formData.get('title'),
        description: formData.get('description'),
        platform: formData.get('platform'),
        repoUrl: formData.get('repoUrl'),
        sellerPaymentLink: formData.get('sellerPaymentLink'),
        priceUsd: parseInt(formData.get('priceUsd')),
        techStack: formData.get('techStack') || '',
        iconUrl: formData.get('iconUrl') || '',
        contactEmail: formData.get('contactEmail'),
        expiresInDays: parseInt(formData.get('expiresInDays')),
        skipPayment: true
      };
      
      try {
        const response = await fetch(`${WORKER_URL}/api/listings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          resultDiv.className = 'status success';
          resultDiv.textContent = `✅ SUCCESS!\n\nProject: ${payload.title}\nID: ${data.id}\nStatus: Pending Review\n\n${data.editUrl ? 'Edit URL: ' + data.editUrl : ''}`;
          form.reset();
        } else {
          throw new Error(data.error || 'Submission failed');
        }
      } catch (error) {
        resultDiv.className = 'status error';
        resultDiv.textContent = `❌ Error: ${error.message}\n\nTry:\n1. Open browser console (F12) for details\n2. Check if worker is deployed\n3. Verify KV binding is configured`;
        console.error('Submission error:', error);
      }
    });
    
    // Test connection on load
    testConnection();
  </script>
</body>
</html>
