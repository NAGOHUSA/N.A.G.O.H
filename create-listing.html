<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing • N.A.G.O.H</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05050A; color: #EAEAFF; font-family: 'DM Mono', monospace; padding: 2rem; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: #0F0F1A; border: 1px solid #252540; border-radius: 1.5rem; padding: 2rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; margin-bottom: 1.5rem; color: #fff; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #8F8FAA; margin-top: 1rem; margin-bottom: 0.5rem; }
    input, textarea, select { width: 100%; background: #0A0A12; border: 1px solid #252540; border-radius: 0.5rem; padding: 0.8rem; color: #fff; font-family: inherit; }
    .btn { width: 100%; background: linear-gradient(135deg, #8a78ff, #52dcb4); border: none; padding: 1rem; border-radius: 2rem; color: #05050A; font-weight: 700; margin-top: 2rem; cursor: pointer; }
    #status { margin-top: 1rem; padding: 1rem; border-radius: 0.5rem; display: none; font-size: 0.8rem; border-left: 4px solid; }
    .success { background: #10201a; color: #52dcb4; border-color: #52dcb4; }
    .error { background: #201010; color: #ffb8c4; border-color: #f06464; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Create Listing<span>.</span></h1>
    <div class="card">
      <form id="listForm">
        <label>App Name</label>
        <input type="text" name="title" required placeholder="e.g. Daily Crumb">
        
        <label>Platform</label>
        <select name="platform">
          <option value="iOS">iOS</option>
          <option value="macOS">macOS</option>
          <option value="Web">Web</option>
        </select>

        <label>Description</label>
        <textarea name="description" rows="3" required></textarea>

        <label>GitHub/URL</label>
        <input type="url" name="url" required>

        <button type="submit" class="btn">Push to KV →</button>
      </form>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://alerts.nagoh.xyz';
    const form = document.getElementById('listForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.style.display = 'block';
      status.className = '';
      status.textContent = 'Pushing to KV_BINDING...';

      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch(`${API_BASE}/api/listings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        if (res.ok) {
          status.className = 'success';
          status.textContent = `Success! Entry created: ${result.id}`;
          form.reset();
        } else {
          throw new Error(result.error || 'Server error');
        }
      } catch (err) {
        status.className = 'error';
        status.textContent = `Error: ${err.message}`;
      }
    });
  </script>
</body>
</html>
