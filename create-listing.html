<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Listing • N.A.G.O.H</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05050A; color: #EAEAFF; font-family: 'DM Mono', monospace; line-height: 1.5; }
    :root { --bg: #05050A; --surface: #0F0F1A; --border: #252540; --accent: #8a78ff; --green: #52dcb4; --red: #f06464; }
    .container { max-width: 800px; margin: 4rem auto; padding: 0 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; margin-bottom: 2rem; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; }
    .logo span { color: var(--green); }
    .btn { display: block; width: 100%; padding: 1rem; border-radius: 12px; font-family: 'Syne'; font-weight: 800; text-transform: uppercase; cursor: pointer; text-decoration: none; text-align: center; border: none; transition: 0.3s; }
    .btn-payment { background: #fff; color: #000; }
    .btn-submit { background: linear-gradient(135deg, var(--accent), var(--green)); color: #000; margin-top: 1rem; }
    .locked { opacity: 0.25; pointer-events: none; filter: grayscale(1); }
    input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; color: #fff; font-family: 'DM Mono'; margin-bottom: 1.2rem; }
    label { font-size: 0.65rem; color: #8F8FAA; text-transform: uppercase; display: block; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .status { padding: 1rem; border-radius: 12px; margin-top: 1rem; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">N.A.G.O.H<span>.</span></div>

  <div class="card" id="payStep">
    <h2 style="font-family:'Syne'; margin-bottom:1rem">01. Listing Fee</h2>
    <p style="color:#8F8FAA; font-size:0.9rem; margin-bottom:1.5rem">To keep the marketplace high-quality, we require a small fee ($5) per listing. Pay via Stripe to unlock the submission form.</p>
    <a href="https://buy.stripe.com/5kQ28r512dFm5Xf6gc1Fe03" class="btn btn-payment" id="stripeBtn">Secure Payment with Stripe</a>
    <div id="paymentStatus" class="status" style="display:block; background:rgba(255,255,255,0.03); color:#8F8FAA; border:1px solid var(--border); margin-top:1.5rem; text-align:center;">
      Awaiting payment detection...
    </div>
  </div>

  <div class="card locked" id="formStep">
    <h2 style="font-family:'Syne'; margin-bottom:1.5rem">02. Listing Details</h2>
    <form id="listingForm">
      <label>Project Title</label>
      <input type="text" name="title" placeholder="e.g. Ghost Kanban" required>
      
      <label>Target Platform</label>
      <select name="platform">
        <option value="iOS">iOS</option>
        <option value="macOS">macOS</option>
        <option value="Web">Web</option>
        <option value="Cross-Platform">Cross-Platform</option>
      </select>

      <label>Technical Description</label>
      <textarea name="description" rows="5" placeholder="Detail the features, tech stack, and state of the code..." required></textarea>
      
      <label>Source Code / Demo URL</label>
      <input type="url" name="repoUrl" placeholder="https://github.com/your-username/repo" required>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <div>
          <label>Asking Price (USD)</label>
          <input type="number" name="priceUsd" placeholder="250" required>
        </div>
        <div>
          <label>Contact Email</label>
          <input type="email" name="contactEmail" placeholder="developer@example.com" required>
        </div>
      </div>

      <button type="submit" class="btn btn-submit">Publish to Marketplace</button>
      <div id="submitStatus" class="status"></div>
    </form>
  </div>
</div>

<script>
  const API_BASE = 'https://alerts.nagoh.xyz';
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session_id');

  // Logic to unlock form upon return from Stripe
  if (sessionId) {
    document.getElementById('formStep').classList.remove('locked');
    document.getElementById('stripeBtn').style.display = 'none';
    const payStatus = document.getElementById('paymentStatus');
    payStatus.innerHTML = "✅ Payment Confirmed. Form Unlocked.";
    payStatus.style.borderColor = "var(--green)";
    payStatus.style.color = "var(--green)";
  }

  document.getElementById('listingForm').onsubmit = async (e) => {
    e.preventDefault();
    const status = document.getElementById('submitStatus');
    status.style.display = 'block';
    status.style.background = "rgba(255,255,255,0.05)";
    status.style.color = "#fff";
    status.textContent = "Publishing to SALES_STORAGE...";

    const data = Object.fromEntries(new FormData(e.target).entries());
    data.stripeSession = sessionId; // Pass the real ID for worker verification

    try {
      const res = await fetch(`${API_BASE}/api/listings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        status.textContent = "🎉 Listing successfully published to the marketplace!";
        status.style.color = "var(--green)";
        status.style.border = "1px solid var(--green)";
        e.target.reset();
      } else {
        const errData = await res.json();
        throw new Error(errData.error || "Submission failed");
      }
    } catch (err) {
      status.textContent = "❌ Error: " + err.message;
      status.style.color = "var(--red)";
      status.style.border = "1px solid var(--red)";
    }
  };
</script>
</body>
</html>
