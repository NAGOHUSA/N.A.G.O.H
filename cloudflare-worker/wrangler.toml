name = "nagoh-alerts"
main = "index.js"
compatibility_date = "2026-01-01"

# Handles all requests on the alerts subdomain:
#   /health              — health check
#   /webhook             — Stripe payment-link webhook
#   /v1/push/:token      — Apple App Store Server Notifications
#   /api/*               — listings & submissions API
[[routes]]
pattern = "alerts.nagoh.xyz/*"
zone_name = "nagoh.xyz"

[vars]
GITHUB_OWNER = "NAGOHUSA"
GITHUB_REPO = "N.A.G.O.H"
SITE_BASE_URL = "https://nagoh.xyz"
# Set secrets via:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put ADMIN_KEY
