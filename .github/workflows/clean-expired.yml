name: Clean Expired Listings

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove expired listings
        id: remove_expired
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const root = process.cwd();
            const listingsDir = path.join(root, '_data', 'listings');
            const secretsDir = path.join(root, '_data', 'listing-secrets');
            const now = new Date();
            let removed = 0;

            for (const name of fs.readdirSync(listingsDir)) {
              if (!name.endsWith('.json')) continue;
              const filePath = path.join(listingsDir, name);
              const raw = fs.readFileSync(filePath, 'utf8');
              let data;
              try {
                data = JSON.parse(raw);
              } catch {
                continue;
              }
              if (!data.expiresAt) continue;
              if (new Date(data.expiresAt) <= now) {
                fs.unlinkSync(filePath);
                const secretPath = path.join(secretsDir, name);
                if (fs.existsSync(secretPath)) fs.unlinkSync(secretPath);
                removed += 1;
                core.info(`Removed expired listing: ${name}`);
              }
            }

            core.setOutput('removed', String(removed));

      - name: Commit deletions
        if: steps.remove_expired.outputs.removed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/listings _data/listing-secrets || true
          git commit -m "chore: remove expired listings"
          git push
