<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppCodeMarket</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="container">
    <h1>AppCodeMarket</h1>
    <p>Buy and sell unfinished iOS/Android app source code.</p>
    <a class="btn" href="create-listing.html">Create listing</a>
  </header>

  <main class="container">
    <section>
      <h2>Available Listings</h2>
      <div id="listings" class="grid"></div>
      <p id="emptyState" class="muted hidden">No listings available right now.</p>
    </section>
  </main>

  <footer class="container muted">
    <small>AppCodeMarket does not process app purchase transactions between buyer and seller.</small>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
