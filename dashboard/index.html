<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N.A.G.O.H · Listing Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #05050f; --surface: #0c0c18; --border: rgba(255,255,255,0.06);
      --accent: #8a78ff; --green: #52dcb4; --red: #f06464;
      --text: #eaeeff; --muted: #6b7094; --display: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .logo { font-family: var(--display); font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #8a78ff, #52dcb4); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    .btn { font-family: var(--mono); font-size: 0.7rem; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; text-decoration: none; transition: 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #8a78ff, #52dcb4); border: none; color: #05050f; font-weight: 600; }
    .btn-danger { color: var(--red); border-color: rgba(240,100,100,0.2); }
    .btn-danger:hover { background: rgba(240,100,100,0.1); }

    .listings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem; color: var(--muted); font-size: 0.6rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    
    /* Edit Modal */
    #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); padding: 2rem; border-radius: 20px; width: 100%; max-width: 500px; }
    input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-family: var(--mono); }
    label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 0.3rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">N.A.G.O.H<span>.</span></div>
    <div style="display:flex; gap:0.75rem;">
      <a href="create-listing.html" class="btn btn-primary">+ New Entry</a>
      <button class="btn" onclick="refreshListings()">⟳ Refresh</button>
    </div>
  </div>

  <div class="listings-panel">
    <div id="listings-table-container">
      <div style="padding: 3rem; text-align: center; color: var(--muted);">Connecting to SALES_STORAGE...</div>
    </div>
  </div>
</div>

<div id="editModal">
  <div class="modal-content">
    <h2 style="font-family: var(--display); margin-bottom: 1.5rem;">Edit Listing</h2>
    <form id="editForm">
      <input type="hidden" id="editId">
      <label>Title</label>
      <input type="text" id="editTitle" required>
      <label>Price (USD)</label>
      <input type="number" id="editPrice" required>
      <label>Description</label>
      <textarea id="editDesc" rows="4"></textarea>
      <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
        <button type="button" class="btn" onclick="closeModal()" style="flex: 1;">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API_BASE = 'https://alerts.nagoh.xyz';

  async function refreshListings() {
    const container = document.getElementById('listings-table-container');
    try {
      const res = await fetch(`${API_BASE}/api/listings`);
      const data = await res.json();
      const listings = data.listings || [];
      renderTable(listings);
    } catch (e) {
      container.innerHTML = `<div style="padding:3rem; color:var(--red)">Failed to load: ${e.message}</div>`;
    }
  }

  function renderTable(listings) {
    const container = document.getElementById('listings-table-container');
    let html = `<table><thead><tr><th>Project</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;

    listings.forEach(item => {
      html += `
        <tr>
          <td>
            <div style="font-weight:600; color:#fff">${item.title}</div>
            <div style="font-size:0.65rem; color:var(--muted)">${item.platform}</div>
          </td>
          <td style="font-weight:700">$${item.priceUsd}</td>
          <td>
            <button class="btn" onclick="openEdit('${item.id}', '${item.title}', '${item.priceUsd}', \`${item.description}\`)">Edit</button>
            <button class="btn btn-danger" onclick="deleteListing('${item.id}')">Delete</button>
          </td>
        </tr>
      `;
    });
    container.innerHTML = html + `</tbody></table>`;
  }

  async function deleteListing(id) {
    if (!confirm('Are you sure you want to delete this listing from SALES_STORAGE?')) return;
    try {
      const res = await fetch(`${API_BASE}/api/listings/${id}`, { method: 'DELETE' });
      if (res.ok) refreshListings();
    } catch (e) { alert('Delete failed'); }
  }

  function openEdit(id, title, price, desc) {
    document.getElementById('editId').value = id;
    document.getElementById('editTitle').value = title;
    document.getElementById('editPrice').value = price;
    document.getElementById('editDesc').value = desc;
    document.getElementById('editModal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('editModal').style.display = 'none'; }

  document.getElementById('editForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const body = {
      title: document.getElementById('editTitle').value,
      priceUsd: document.getElementById('editPrice').value,
      description: document.getElementById('editDesc').value
    };

    try {
      const res = await fetch(`${API_BASE}/api/listings/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) { closeModal(); refreshListings(); }
    } catch (e) { alert('Update failed'); }
  };

  refreshListings();
</script>
</body>
</html>
