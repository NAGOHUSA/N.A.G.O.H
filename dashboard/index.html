<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nagoh Sales Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0c12 0%, #0f111a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: #eef2ff;
      padding: 20px;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(18, 22, 35, 0.95);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    .login-box h2 {
      text-align: center;
      background: linear-gradient(135deg, #fff, #64ffda);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 30px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      background: #1a1e30;
      border: 1px solid #2a2f4b;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: linear-gradient(135deg, #64ffda, #a78bfa);
      border: none;
      border-radius: 12px;
      color: #0a0c12;
      font-weight: bold;
      cursor: pointer;
    }
    .dashboard {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
    }
    .logout-btn, .clear-btn {
      position: fixed;
      top: 20px;
      background: #2a2f4b;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      z-index: 100;
    }
    .logout-btn {
      right: 20px;
    }
    .clear-btn {
      right: 100px;
      background: #dc2626;
    }
    .clear-btn:hover {
      background: #b91c1c;
    }
    .logout-btn:hover {
      background: #f87171;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #fff, #64ffda);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .stat-card {
      background: rgba(18, 22, 35, 0.9);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b92b0;
      margin-bottom: 10px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #64ffda;
    }
    .panel {
      background: #0e111b;
      border-radius: 20px;
      border: 1px solid #232736;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .panel-header {
      background: #13172a;
      padding: 15px 20px;
      border-bottom: 1px solid #232736;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .refresh-btn {
      background: #1f253e;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .sales-list {
      max-height: 500px;
      overflow-y: auto;
    }
    .sale-item {
      padding: 15px 20px;
      border-bottom: 1px solid #1a1e30;
    }
    .sale-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .event-type {
      background: #2a2f4b;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .revenue {
      font-size: 1.2rem;
      font-weight: bold;
      color: #64ffda;
    }
    .timestamp {
      font-size: 0.7rem;
      color: #6b7280;
      margin-top: 5px;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    .status-bar {
      background: #0e111b;
      border-radius: 20px;
      padding: 15px 20px;
      border: 1px solid #232736;
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .error-msg {
      color: #f87171;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h2>🔐 Admin Access</h2>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login to Dashboard</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <button class="clear-btn" onclick="clearTestData()">🗑️ Clear Test Data</button>
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  
  <h1>🍎 Nagoh Live Sales Dashboard</h1>
  <div style="color:#8b92b0; margin-bottom:20px;">Real-time App Store notifications • Auto-refreshes every 5 seconds</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Today's Revenue</div>
      <div class="stat-value" id="todayRevenue">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Sales</div>
      <div class="stat-value" id="totalSales">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Sale</div>
      <div class="stat-value" id="lastAmount">—</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span><span class="live-dot"></span> 🔔 Live Sales Feed</span>
      <button class="refresh-btn" onclick="fetchSales()">🔄 Refresh Now</button>
    </div>
    <div id="salesFeed" class="sales-list">
      <div class="empty-state">Loading sales data...</div>
    </div>
  </div>

  <div class="status-bar">
    <div>
      <span class="live-dot"></span>
      <span id="connectionStatus">Checking connection...</span>
    </div>
    <div>
      <code id="workerUrl">https://alerts.nagoh.xyz</code>
    </div>
    <div>
      <span id="lastUpdate">Last update: --</span>
    </div>
  </div>
</div>

<script>
// Authentication
const VALID_USERNAME = 'admin';
const VALID_PASSWORD = 'admin';
let refreshInterval;

function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('loginError');
  
  if (username === VALID_USERNAME && password === VALID_PASSWORD) {
    sessionStorage.setItem('dashboard_auth', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startDashboard();
  } else {
    errorDiv.textContent = '❌ Invalid credentials. Use admin / admin';
  }
}

function logout() {
  sessionStorage.removeItem('dashboard_auth');
  if (refreshInterval) clearInterval(refreshInterval);
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

// Check if already logged in
if (sessionStorage.getItem('dashboard_auth') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  startDashboard();
}

// Clear test data
async function clearTestData() {
  if (!confirm('⚠️ WARNING: This will delete ALL sales data from the database. This cannot be undone. Are you sure?')) {
    return;
  }
  
  const statusDiv = document.getElementById('connectionStatus');
  statusDiv.innerHTML = '🗑️ Clearing data...';
  
  try {
    const response = await fetch('https://alerts.nagoh.xyz/api/sales', {
      method: 'DELETE',
      headers: {
        'Accept': 'application/json',
      }
    });
    
    if (response.ok) {
      const data = await response.json();
      console.log('Clear response:', data);
      statusDiv.innerHTML = '✅ Data cleared successfully';
      // Refresh the sales display
      await fetchSales();
      setTimeout(() => {
        if (statusDiv.innerHTML === '✅ Data cleared successfully') {
          statusDiv.innerHTML = '✅ Connected to worker';
        }
      }, 3000);
    } else {
      statusDiv.innerHTML = `❌ Failed to clear data: ${response.status}`;
    }
  } catch (error) {
    console.error('Error clearing data:', error);
    statusDiv.innerHTML = '❌ Error clearing data';
  }
}

// Fetch sales from worker
async function fetchSales() {
  const statusDiv = document.getElementById('connectionStatus');
  const feedDiv = document.getElementById('salesFeed');
  
  try {
    const response = await fetch('https://alerts.nagoh.xyz/api/sales', {
      method: 'GET',
      headers: {
        'Accept': 'application/json',
      }
    });
    
    if (response.ok) {
      const data = await response.json();
      console.log('Dashboard received data:', data);
      
      if (data.success && data.sales) {
        statusDiv.innerHTML = '✅ Connected to worker';
        document.getElementById('lastUpdate').innerHTML = `Last update: ${new Date().toLocaleTimeString()}`;
        displaySales(data.sales);
        updateStats(data.sales);
      } else {
        statusDiv.innerHTML = '⚠️ No sales data yet';
        feedDiv.innerHTML = '<div class="empty-state">✨ No sales yet. Waiting for App Store notifications...</div>';
      }
    } else {
      statusDiv.innerHTML = `⚠️ HTTP ${response.status}`;
      feedDiv.innerHTML = `<div class="empty-state">Error: HTTP ${response.status}<br>Make sure worker is deployed.</div>`;
    }
  } catch (error) {
    console.error('Fetch error:', error);
    statusDiv.innerHTML = '❌ Cannot connect';
    feedDiv.innerHTML = `<div class="empty-state">❌ Cannot connect to worker<br>${error.message}</div>`;
  }
}

function displaySales(sales) {
  const container = document.getElementById('salesFeed');
  if (!sales || sales.length === 0) {
    container.innerHTML = '<div class="empty-state">✨ No sales yet. Waiting for App Store notifications...</div>';
    return;
  }
  
  container.innerHTML = sales.map(sale => `
    <div class="sale-item">
      <div class="sale-header">
        <span class="event-type">${sale.notificationType || 'SALE'} ${sale.subtype ? `· ${sale.subtype}` : ''}</span>
        <span class="revenue">${sale.revenue ? `$${sale.revenue.toFixed(2)}` : '—'}</span>
      </div>
      <div style="font-size:0.8rem; color:#9ca3af;">
        ${sale.bundleID ? `📱 ${sale.bundleID.split('.').pop()}` : 'Unknown app'}
      </div>
      <div class="timestamp">${new Date(sale.timestamp).toLocaleString()}</div>
    </div>
  `).join('');
}

function updateStats(sales) {
  const today = new Date().toDateString();
  let todayRevenue = 0;
  
  for (const sale of sales) {
    if (sale.revenue && sale.revenue > 0 && new Date(sale.timestamp).toDateString() === today) {
      todayRevenue += sale.revenue;
    }
  }
  
  document.getElementById('todayRevenue').innerText = `$${todayRevenue.toFixed(2)}`;
  document.getElementById('totalSales').innerText = sales.length;
  
  if (sales.length > 0 && sales[0].revenue) {
    document.getElementById('lastAmount').innerHTML = `$${sales[0].revenue.toFixed(2)}`;
  } else if (sales.length > 0) {
    document.getElementById('lastAmount').innerHTML = sales[0].notificationType || 'Event';
  }
}

function startDashboard() {
  fetchSales();
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(fetchSales, 5000);
  document.getElementById('workerUrl').innerHTML = 'https://alerts.nagoh.xyz';
}

// Initial fetch if already logged in
if (document.getElementById('dashboard').style.display !== 'none') {
  fetchSales();
}
</script>
</body>
</html>
