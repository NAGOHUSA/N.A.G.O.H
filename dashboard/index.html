<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N.A.G.O.H · Advanced Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #05050f; --surface: #0c0c18; --border: rgba(255,255,255,0.06);
      --accent: #8a78ff; --green: #52dcb4; --red: #f06464;
      --text: #eaeeff; --muted: #6b7094; --display: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .logo { font-family: var(--display); font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo span { color: var(--green); -webkit-text-fill-color: var(--green); }
    
    .btn { font-family: var(--mono); font-size: 0.7rem; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; transition: 0.2s; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--green)); border: none; color: #000; font-weight: 700; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { color: var(--red); border-color: rgba(240,100,100,0.2); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem; color: var(--muted); font-size: 0.6rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 1.2rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.02); }

    #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; width: 100%; max-width: 600px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
    input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 0.7rem; border-radius: 8px; font-family: var(--mono); margin-bottom: 1rem; }
    input:focus, textarea:focus { border-color: var(--accent); outline: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">N.A.G.O.H<span>.</span> MANAGER</div>
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="logout()">Logout</button>
      <button class="btn btn-primary" onclick="refreshListings()">⟳ Sync KV</button>
    </div>
  </div>

  <div class="card">
    <div id="table-container">
      <div style="padding:4rem; text-align:center; color:var(--muted)">Loading SALES_STORAGE...</div>
    </div>
  </div>
</div>

<div id="editModal">
  <div class="modal-content">
    <h2 style="font-family: var(--display); margin-bottom: 1.5rem;">Edit Metadata</h2>
    <form id="editForm">
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div><label>Title</label><input type="text" id="editTitle" required></div>
        <div><label>Platform</label>
          <select id="editPlatform">
            <option value="iOS">iOS</option><option value="macOS">macOS</option>
            <option value="Web">Web</option><option value="Cross-Platform">Cross-Platform</option>
          </select>
        </div>
      </div>
      <label>Description</label>
      <textarea id="editDesc" rows="3" required></textarea>
      <label>Repository URL</label>
      <input type="url" id="editRepo" required>
      <div class="form-grid">
        <div><label>Price (USD)</label><input type="number" id="editPrice" required></div>
        <div><label>Contact Email</label><input type="email" id="editEmail" required></div>
      </div>
      <div style="display:flex; gap:1rem;">
        <button type="submit" id="saveBtn" class="btn btn-primary" style="flex:2">Save Changes</button>
        <button type="button" class="btn" onclick="closeModal()" style="flex:1">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API_BASE = 'https://alerts.nagoh.xyz';
  let token = localStorage.getItem('nagoh_auth');

  async function checkAuth() {
    if (!token) {
      token = prompt("Enter Management Password:");
      if (!token) return;
      localStorage.setItem('nagoh_auth', token);
    }
    try {
      const res = await fetch(`${API_BASE}/api/admin-verify`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) {
        localStorage.removeItem('nagoh_auth');
        alert("Invalid Password");
        location.reload();
      }
    } catch(e) {
      console.error("Auth check failed", e);
    }
  }

  function logout() {
    localStorage.removeItem('nagoh_auth');
    location.reload();
  }

  async function refreshListings() {
    await checkAuth();
    const container = document.getElementById('table-container');
    try {
      const res = await fetch(`${API_BASE}/api/listings`);
      const data = await res.json();
      renderTable(data.listings || []);
    } catch (e) { 
      container.innerHTML = `<div style="padding:4rem; color:var(--red)">Sync Failed: ${e.message}</div>`; 
    }
  }

  function renderTable(listings) {
    const container = document.getElementById('table-container');
    let html = `<table><thead><tr><th>Listing</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
    
    if (listings.length === 0) {
      html += `<tr><td colspan="3" style="text-align:center; color:var(--muted); padding:3rem;">No active records found.</td></tr>`;
    }

    listings.forEach(item => {
      // Safely escape description for the onclick string
      const safeDesc = b64EncodeUnicode(item.description || "");
      html += `<tr>
        <td>
          <div style="font-weight:700; color:#fff">${item.title}</div>
          <div style="font-size:0.7rem; color:var(--muted)">${item.platform} • ${item.contactEmail}</div>
        </td>
        <td style="color:var(--green); font-weight:700">$${item.priceUsd}</td>
        <td>
          <button class="btn" onclick="openEdit('${item.id}', '${item.title}', '${item.priceUsd}', '${safeDesc}', '${item.repoUrl}', '${item.platform}', '${item.contactEmail}')">Edit</button>
          <button class="btn btn-danger" onclick="deleteListing('${item.id}')">Delete</button>
        </td>
      </tr>`;
    });
    container.innerHTML = html + `</tbody></table>`;
  }

  // Helper to handle special characters in descriptions
  function b64EncodeUnicode(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
  }
  function b64DecodeUnicode(str) {
    return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
  }

  function openEdit(id, title, price, safeDesc, repo, platform, email) {
    document.getElementById('editId').value = id;
    document.getElementById('editTitle').value = title;
    document.getElementById('editPrice').value = price;
    document.getElementById('editDesc').value = b64DecodeUnicode(safeDesc);
    document.getElementById('editRepo').value = repo;
    document.getElementById('editPlatform').value = platform;
    document.getElementById('editEmail').value = email;
    document.getElementById('editModal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('editModal').style.display = 'none'; }

  document.getElementById('editForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const saveBtn = document.getElementById('saveBtn');
    
    saveBtn.textContent = "Saving...";
    saveBtn.disabled = true;

    const body = {
      title: document.getElementById('editTitle').value,
      priceUsd: document.getElementById('editPrice').value,
      description: document.getElementById('editDesc').value,
      repoUrl: document.getElementById('editRepo').value,
      platform: document.getElementById('editPlatform').value,
      contactEmail: document.getElementById('editEmail').value
    };

    try {
      const res = await fetch(`${API_BASE}/api/listings/${id}`, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        closeModal();
        await refreshListings();
      } else {
        const err = await res.json();
        alert(`Save Failed: ${err.error || res.statusText}`);
      }
    } catch (err) {
      alert(`Network Error: ${err.message}`);
    } finally {
      saveBtn.textContent = "Save Changes";
      saveBtn.disabled = false;
    }
  };

  async function deleteListing(id) {
    if (!confirm('Permanent Delete?')) return;
    try {
      const res = await fetch(`${API_BASE}/api/listings/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        refreshListings();
      } else {
        alert("Delete failed.");
      }
    } catch(e) { alert("Network error during delete."); }
  }

  refreshListings();
</script>
</body>
</html>
