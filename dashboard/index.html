<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagoh Sales Dashboard</title>

<style>
:root {
  --bg: #0b0f17;
  --card: rgba(20, 25, 40, 0.85);
  --border: rgba(255,255,255,0.06);
  --accent: #64ffda;
  --accent2: #7c3aed;
  --text: #e6e9f2;
  --muted: #8b92b0;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top, #111827, #020617);
  color: var(--text);
  padding: 24px;
}

.dashboard {
  max-width: 1300px;
  margin: auto;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 30px;
}

.title {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  color: transparent;
}

.actions button {
  background: var(--card);
  border:1px solid var(--border);
  padding:10px 14px;
  border-radius: 12px;
  color: white;
  cursor:pointer;
  margin-left:10px;
  transition: all .2s ease;
}

.actions button:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap:20px;
  margin-bottom: 30px;
}

.card {
  background: var(--card);
  border:1px solid var(--border);
  border-radius: 18px;
  padding:20px;
  backdrop-filter: blur(12px);
  transition: .25s;
}

.card:hover {
  border-color: rgba(100,255,218,0.4);
  transform: translateY(-3px);
}

.label {
  font-size:.75rem;
  color: var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}

.value {
  font-size:2rem;
  font-weight:700;
  margin-top:8px;
  color: var(--accent);
}

.panel {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
}

.panel-header {
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

.sales {
  max-height:500px;
  overflow:auto;
}

.sale {
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sale:hover {
  background: rgba(255,255,255,0.02);
}

.badge {
  font-size:.7rem;
  background: rgba(124,58,237,0.2);
  padding:4px 10px;
  border-radius:20px;
}

.amount {
  font-weight:700;
  color: var(--accent);
}

.timestamp {
  font-size:.7rem;
  color: var(--muted);
}

.empty {
  padding:40px;
  text-align:center;
  color: var(--muted);
}

</style>
</head>

<body>

<div class="dashboard">

<div class="header">
  <div class="title">Nagoh Dashboard</div>
  <div class="actions">
    <button onclick="fetchSales()">Refresh</button>
    <button onclick="clearTestData()">Clear</button>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="label">Today's Revenue</div>
    <div class="value" id="todayRevenue">$0</div>
  </div>
  <div class="card">
    <div class="label">Total Sales</div>
    <div class="value" id="totalSales">0</div>
  </div>
  <div class="card">
    <div class="label">Last Sale</div>
    <div class="value" id="lastAmount">—</div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">
    <div>Live Sales</div>
  </div>
  <div id="salesFeed" class="sales"></div>
</div>

</div>

<script>
async function fetchSales(){
  const container = document.getElementById('salesFeed');
  container.innerHTML = '<div class="empty">Loading...</div>';

  try{
    const res = await fetch('https://alerts.nagoh.xyz/api/sales');
    const data = await res.json();

    if(!data.sales || data.sales.length === 0){
      container.innerHTML = '<div class="empty">No sales yet</div>';
      return;
    }

    container.innerHTML = data.sales.map(s => `
      <div class="sale">
        <div>
          <div class="badge">${s.notificationType || 'SALE'}</div>
          <div class="timestamp">${new Date(s.timestamp).toLocaleString()}</div>
        </div>
        <div class="amount">${s.revenue ? '$'+s.revenue.toFixed(2) : '—'}</div>
      </div>
    `).join('');

    updateStats(data.sales);

  }catch(e){
    container.innerHTML = '<div class="empty">Connection error</div>';
  }
}

function updateStats(sales){
  let total = 0;
  let today = new Date().toDateString();

  sales.forEach(s=>{
    if(s.revenue) total += s.revenue;
  });

  document.getElementById('totalSales').innerText = sales.length;
  document.getElementById('todayRevenue').innerText = '$'+total.toFixed(2);

  if(sales[0]){
    document.getElementById('lastAmount').innerText = sales[0].revenue ? '$'+sales[0].revenue.toFixed(2) : 'Event';
  }
}

fetchSales();
</script>

</body>
</html>
