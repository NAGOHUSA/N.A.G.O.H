<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N.A.G.O.H · Listing Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Styling remains consistent with your Nagoh theme */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #05050f; --surface: #0c0c18; --surface2: #12122a;
      --border: rgba(255,255,255,0.06); --border-hi: rgba(138,120,255,0.35);
      --accent: #8a78ff; --green: #52dcb4; --red: #f06464;
      --text: #eaeeff; --muted: #6b7094; --display: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: var(--display); font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #8a78ff, #52dcb4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo span { color: #52dcb4; -webkit-text-fill-color: #52dcb4; }
    .btn { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, #8a78ff, #52dcb4); border: none; color: #05050f; font-weight: 600; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; }
    .stat-value { font-family: var(--display); font-size: 2rem; font-weight: 700; color: #fff; }
    .listings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
    .panel-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem; color: var(--muted); font-size: 0.6rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .platform-badge { padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.6rem; font-weight: 600; }
    .platform-ios { background: rgba(138,120,255,0.15); color: #8a78ff; }
    .platform-macos { background: rgba(255,255,255,0.1); color: #fff; }
    .platform-web { background: rgba(82,220,180,0.15); color: #52dcb4; }
    .loading { padding: 3rem; text-align: center; color: var(--muted); }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <div class="logo">N.A.G.O.H<span>.</span></div>
      <div style="font-size: 0.65rem; color: var(--muted); margin-top: 0.4rem;">SALES_STORAGE MANAGER</div>
    </div>
    <div style="display:flex; gap:0.75rem;">
      <a href="create-listing.html" class="btn btn-primary">+ New Entry</a>
      <button class="btn" onclick="refreshListings()">⟳ Refresh</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div style="font-size:0.6rem; color:var(--muted); text-transform:uppercase;">Active Records</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div style="font-size:0.6rem; color:var(--muted); text-transform:uppercase;">Latest Push</div>
      <div id="stat-latest" style="font-size:0.8rem; margin-top:0.5rem; color:var(--green)">--</div>
    </div>
  </div>

  <div class="listings-panel">
    <div class="panel-header">
      <div style="font-family:var(--display); font-size:0.8rem; font-weight:700;">📋 SALES KV EXPLORER</div>
      <div id="kv-status" style="font-size:0.65rem; color:var(--muted)">Checking connection...</div>
    </div>
    <div id="listings-table-container">
      <div class="loading">Initializing connection to alerts.nagoh.xyz...</div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'https://alerts.nagoh.xyz';

  async function refreshListings() {
    const container = document.getElementById('listings-table-container');
    const kvStatus = document.getElementById('kv-status');
    
    try {
      const response = await fetch(`${API_BASE}/api/listings`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      const listings = data.listings || [];

      // Update Stats
      document.getElementById('stat-total').textContent = listings.length;
      kvStatus.textContent = `Connected: ${listings.length} records found`;
      
      if (listings.length > 0) {
        document.getElementById('stat-latest').textContent = new Date(listings[0].createdAt).toLocaleTimeString();
        renderTable(listings);
      } else {
        container.innerHTML = '<div class="loading">No records found in SALES_STORAGE index.</div>';
      }

    } catch (error) {
      console.error('Fetch error:', error);
      container.innerHTML = `<div class="loading" style="color:var(--red)">⚠️ Error: ${error.message}</div>`;
      kvStatus.textContent = 'Connection failed';
    }
  }

  function renderTable(listings) {
    const container = document.getElementById('listings-table-container');
    
    let html = `
      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th>Platform</th>
            <th>Email</th>
            <th>Price</th>
            <th>Date Created</th>
          </tr>
        </thead>
        <tbody>
    `;

    listings.forEach(item => {
      if (!item) return;
      const platformClass = `platform-${(item.platform || 'web').toLowerCase()}`;
      const date = item.createdAt ? new Date(item.createdAt).toLocaleDateString() : '---';
      
      html += `
        <tr>
          <td>
            <div style="font-weight:600; color:#fff">${item.title || 'Untitled'}</div>
            <div style="font-size:0.65rem; color:var(--muted); max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.description || ''}</div>
          </td>
          <td><span class="platform-badge ${platformClass}">${item.platform || 'Web'}</span></td>
          <td style="font-size:0.7rem; color:var(--muted)">${item.contactEmail || '---'}</td>
          <td style="font-family:var(--display); font-weight:700">$${item.priceUsd || '0'}</td>
          <td style="font-size:0.65rem; color:var(--muted)">${date}</td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // Initial Load
  refreshListings();
  // Auto-refresh every 60 seconds
  setInterval(refreshListings, 60000);
</script>

</body>
</html>
