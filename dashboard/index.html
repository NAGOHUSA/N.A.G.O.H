<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nagoh Sales Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0c12 0%, #0f111a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: #eef2ff;
      padding: 20px;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(18, 22, 35, 0.95);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    .login-box h2 {
      text-align: center;
      background: linear-gradient(135deg, #fff, #64ffda);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 30px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      background: #1a1e30;
      border: 1px solid #2a2f4b;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: linear-gradient(135deg, #64ffda, #a78bfa);
      border: none;
      border-radius: 12px;
      color: #0a0c12;
      font-weight: bold;
      cursor: pointer;
    }
    .dashboard {
      display: none;
      max-width: 1400px;
      margin: 0 auto;
    }
    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #2a2f4b;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #fff, #64ffda);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .stat-card {
      background: rgba(18, 22, 35, 0.9);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #64ffda;
    }
    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 25px;
    }
    @media (max-width: 768px) {
      .two-columns { grid-template-columns: 1fr; }
    }
    .panel {
      background: #0e111b;
      border-radius: 20px;
      border: 1px solid #232736;
      overflow: hidden;
    }
    .panel-header {
      background: #13172a;
      padding: 15px 20px;
      border-bottom: 1px solid #232736;
      display: flex;
      justify-content: space-between;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .sales-feed, .db-log {
      max-height: 500px;
      overflow-y: auto;
    }
    .sale-item {
      padding: 15px 20px;
      border-bottom: 1px solid #1a1e30;
    }
    .sale-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .event-type {
      background: #2a2f4b;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .revenue {
      font-size: 1.2rem;
      font-weight: bold;
      color: #64ffda;
    }
    .timestamp {
      font-size: 0.7rem;
      color: #6b7280;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    button {
      cursor: pointer;
    }
    .refresh-btn {
      background: #1f253e;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      color: white;
    }
  </style>
</head>
<body>
<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h2>🔐 Admin Access</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="loginError" style="color:#f87171; text-align:center; margin-top:15px;"></div>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <button class="logout-btn" onclick="logout()">Logout</button>
  <h1>🍎 Nagoh Live Sales Dashboard</h1>
  <div style="color:#8b92b0;">Real-time sales from App Store • Auto-refreshes every 3 seconds</div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Today's Revenue</div><div class="stat-value" id="todayRevenue">$0.00</div></div>
    <div class="stat-card"><div class="stat-label">Total Sales</div><div class="stat-value" id="totalSales">0</div></div>
    <div class="stat-card"><div class="stat-label">Last Sale</div><div class="stat-value" id="lastAmount">—</div></div>
  </div>

  <div class="two-columns">
    <div class="panel">
      <div class="panel-header"><span><span class="live-dot"></span> Live Sales Feed</span><button class="refresh-btn" onclick="fetchSales()">Refresh</button></div>
      <div id="salesFeed" class="sales-feed"><div class="empty-state">Loading...</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">📊 Recent Activity</div>
      <div id="activityLog" class="db-log"><div class="empty-state">Waiting for sales...</div></div>
    </div>
  </div>
</div>

<script>
const VALID_USERNAME = 'admin';
const VALID_PASSWORD = 'admin';
let refreshInterval;

function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  if (username === VALID_USERNAME && password === VALID_PASSWORD) {
    sessionStorage.setItem('auth', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startDashboard();
  } else {
    document.getElementById('loginError').innerText = 'Invalid credentials';
  }
}

function logout() {
  sessionStorage.removeItem('auth');
  clearInterval(refreshInterval);
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

if (sessionStorage.getItem('auth') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  startDashboard();
}

async function fetchSales() {
  try {
    const response = await fetch('https://alerts.nagoh.xyz/api/sales');
    const data = await response.json();
    if (data.success && data.sales) {
      displaySales(data.sales);
      updateStats(data.sales);
    }
  } catch (error) {
    console.error('Error fetching sales:', error);
    document.getElementById('salesFeed').innerHTML = '<div class="empty-state">Error connecting to worker. Make sure the worker is deployed.</div>';
  }
}

function displaySales(sales) {
  const container = document.getElementById('salesFeed');
  if (!sales || sales.length === 0) {
    container.innerHTML = '<div class="empty-state">No sales yet. Waiting for App Store notifications...</div>';
    return;
  }
  
  container.innerHTML = sales.slice(0, 50).map(sale => `
    <div class="sale-item">
      <div class="sale-header">
        <span class="event-type">${sale.notificationType || 'SALE'} ${sale.subtype || ''}</span>
        <span class="revenue">${sale.revenue ? `$${sale.revenue.toFixed(2)}` : '—'}</span>
      </div>
      <div style="font-size:0.8rem; color:#9ca3af;">${sale.bundleID ? sale.bundleID.split('.').pop() : 'Unknown app'}</div>
      <div class="timestamp">${new Date(sale.timestamp).toLocaleString()}</div>
    </div>
  `).join('');
  
  // Update activity log
  const logContainer = document.getElementById('activityLog');
  logContainer.innerHTML = sales.slice(0, 20).map(sale => `
    <div style="padding:12px 15px; border-bottom:1px solid #1a1e30;">
      <div style="color:#64ffda;">💰 ${sale.notificationType || 'Sale'}</div>
      <div style="font-size:0.7rem; color:#6b7280;">${new Date(sale.timestamp).toLocaleString()}</div>
    </div>
  `).join('');
}

function updateStats(sales) {
  const today = new Date().toDateString();
  let todayRevenue = 0;
  for (const sale of sales) {
    if (sale.revenue && new Date(sale.timestamp).toDateString() === today) {
      todayRevenue += sale.revenue;
    }
  }
  document.getElementById('todayRevenue').innerText = `$${todayRevenue.toFixed(2)}`;
  document.getElementById('totalSales').innerText = sales.length;
  if (sales.length > 0 && sales[0].revenue) {
    document.getElementById('lastAmount').innerHTML = `$${sales[0].revenue.toFixed(2)}`;
  }
}

function startDashboard() {
  fetchSales();
  refreshInterval = setInterval(fetchSales, 3000);
}
</script>
</body>
</html>
